// ======================= ФУНКЦИЯ ОПРЕДЕЛЕНИЯ УРОВНЯ =======================
function getLevel(score) {
    if (score >= 450) return "🏆 Легенда геометрии";
    if (score >= 360) return "🔴 Профи";
    if (score >= 270) return "🟣 Мастер доказательств";
    if (score >= 180) return "🟠 Решатель задач";
    if (score >= 90) return "🔵 Знаток теории";
    return "🟢 Новичок";
}

// ======================= ГЛОБАЛЬНОЕ СОСТОЯНИЕ И ФУНКЦИИ =======================
let currentFigure = "triangle", activeTab = "test", totalScore = 0;
let figureProgress = {}, tasksProgress = {}, taskPenalty = {};
let answerLock = false;

function initProgress(){
    totalScore = 0;
    for(let f in figuresData){
        figureProgress[f] = 0;
        tasksProgress[f] = 0;
        if(!taskPenalty[f]) taskPenalty[f] = {};
        for(let i=0; i<figuresData[f].tasks.length; i++) taskPenalty[f][i] = false;
    }
    updateScoreAndLevel();
}
function updateScoreAndLevel() {
    document.getElementById("totalScore").innerText = totalScore;
    document.getElementById("levelDisplay").innerText = getLevel(totalScore);
}
function adjustScore(delta){
    totalScore += delta;
    if(totalScore < 0) totalScore = 0;
    updateScoreAndLevel();
}
function resetAll(){ if(confirm("Сбросить весь прогресс?")){ initProgress(); renderActiveTab(); alert("Прогресс сброшен."); } }

// ======================= ЭКСПОРТ В PDF (pdfmake) =======================
function exportToPDF() {
    let studentName = prompt("Введите ваше имя для отчёта:", "Ученик");
    if (!studentName) studentName = "Аноним";
    
    let tableBody = [];
    for (let [key, fig] of Object.entries(figuresData)) {
        const testTotal = fig.questions.length;
        const testSolved = figureProgress[key] || 0;
        const tasksTotal = fig.tasks.length;
        const tasksSolved = tasksProgress[key] || 0;
        tableBody.push([
            fig.name,
            `${testSolved} / ${testTotal} (${Math.round((testSolved/testTotal)*100)}%)`,
            `${tasksSolved} / ${tasksTotal} (${Math.round((tasksSolved/tasksTotal)*100)}%)`
        ]);
    }
    
    const docDefinition = {
        pageOrientation: 'portrait',
        content: [
            { text: 'Отчёт по геометрии', style: 'header', alignment: 'center' },
            { text: `Ученик: ${studentName}`, style: 'subheader', margin: [0, 10, 0, 5] },
            { text: `Дата: ${new Date().toLocaleString()}`, style: 'subheader', margin: [0, 0, 0, 5] },
            { text: `Общий счёт: ${totalScore} баллов`, style: 'subheader', margin: [0, 0, 0, 5] },
            { text: `Уровень: ${getLevel(totalScore)}`, style: 'subheader', margin: [0, 0, 0, 15] },
            {
                table: {
                    headerRows: 1,
                    widths: ['*', 'auto', 'auto'],
                    body: [
                        [{ text: 'Тема', style: 'tableHeader' }, { text: 'Тест', style: 'tableHeader' }, { text: 'Задачи', style: 'tableHeader' }],
                        ...tableBody
                    ]
                },
                layout: 'lightHorizontalLines'
            }
        ],
        styles: {
            header: { bold: true, fontSize: 16, alignment: 'center' },
            subheader: { fontSize: 12, alignment: 'left' },
            tableHeader: { bold: true, fontSize: 12, fillColor: '#2c7ab1', color: 'white', alignment: 'center' }
        }
    };
    
    pdfMake.createPdf(docDefinition).download(`geometry_report_${studentName}.pdf`);
}

// ======================= ОТРИСОВКА ИНТЕРФЕЙСА (без изменений, кроме вызова updateScoreAndLevel) =======================
function renderNav(){
    let nav = document.getElementById("figuresNav");
    nav.innerHTML = "";
    for(let [key,data] of Object.entries(figuresData)){
        let btn = document.createElement("button");
        btn.className = `fig-btn ${key===currentFigure?"active":""}`;
        btn.innerText = data.name;
        btn.onclick = ()=>{ if(key===currentFigure) return; currentFigure=key; renderNav(); loadFigure(); renderActiveTab(); };
        nav.appendChild(btn);
    }
}
function loadFigure(){
    let f = figuresData[currentFigure];
    document.getElementById("figureTitle").innerText = f.name;
    document.getElementById("theoryText").innerHTML = f.theory;
    let canvas = document.getElementById("figureCanvas"), ctx = canvas.getContext("2d");
    let resize = new ResizeObserver(()=>{ canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; f.draw(ctx, canvas.width, canvas.height); });
    if(canvas._ro) canvas._ro.disconnect();
    canvas._ro = resize;
    resize.observe(canvas);
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    f.draw(ctx, canvas.width, canvas.height);
}
function renderActiveTab(){ if(activeTab==="test") renderTest(); else renderTasks(); updateProgressBar(); }
function updateProgressBar(){
    let f = figuresData[currentFigure];
    let total = activeTab==="test"? f.questions.length : f.tasks.length;
    let solved = activeTab==="test"? (figureProgress[currentFigure]||0) : (tasksProgress[currentFigure]||0);
    let percent = total ? (solved/total)*100 : 0;
    document.getElementById("topicProgressFill").style.width = percent+"%";
}

function renderTest(){
    let f = figuresData[currentFigure];
    let qs = f.questions, done = figureProgress[currentFigure]||0;
    if(done >= qs.length){
        document.getElementById("testContent").innerHTML = `<div style="text-align:center;padding:20px;"><p>🎉 Тест пройден!</p><button id="resetTestBtn" class="next-btn">Пройти заново</button></div>`;
        let btn = document.getElementById("resetTestBtn");
        if(btn) btn.onclick = ()=>{ totalScore -= done*5; if(totalScore<0) totalScore=0; figureProgress[currentFigure]=0; updateScoreAndLevel(); renderTest(); updateProgressBar(); };
        return;
    }
    let idx = done, task = qs[idx];
    let opts = ""; task.options.forEach((o,i)=>{ opts += `<button class="option" data-opt="${i}">${o}</button>`; });
    document.getElementById("testContent").innerHTML = `<div class="task-text">📌 ${task.text}</div><div class="options">${opts}</div><div class="feedback" id="feedbackArea"></div><button class="next-btn" id="nextTestBtn" style="display:none;">➡️ Далее</button>`;
    answerLock = false;
    document.querySelectorAll("#testContent .option").forEach(btn=>{
        btn.onclick = ()=>{
            if(answerLock) return;
            let sel = parseInt(btn.dataset.opt);
            let correct = (sel === task.correct);
            let fb = document.getElementById("feedbackArea");
            if(correct){
                adjustScore(5);
                figureProgress[currentFigure] = idx+1;
                fb.innerHTML = `✅ +5 баллов. ${task.expl}`;
                fb.style.background="#d4edda";
            } else {
                adjustScore(-2);
                fb.innerHTML = `❌ -2 балла. Правильно: ${task.options[task.correct]}. ${task.expl}`;
                fb.style.background="#f8d7da";
            }
            answerLock = true;
            let nxt = document.getElementById("nextTestBtn");
            nxt.style.display = "block";
            nxt.onclick = ()=>{ answerLock=false; renderTest(); updateProgressBar(); };
        };
    });
}

function renderTasks(){
    let f = figuresData[currentFigure];
    let tasks = f.tasks, solved = tasksProgress[currentFigure]||0;
    if(solved >= tasks.length){
        document.getElementById("tasksContent").innerHTML = `<div style="text-align:center;padding:20px;"><p>🎉 Все задачи решены!</p><button id="resetTasksBtn" class="next-btn">Решить заново</button></div>`;
        let btn = document.getElementById("resetTasksBtn");
        if(btn) btn.onclick = ()=>{
            totalScore -= solved*5; if(totalScore<0) totalScore=0;
            tasksProgress[currentFigure]=0;
            for(let i=0;i<tasks.length;i++) taskPenalty[currentFigure][i]=false;
            updateScoreAndLevel(); renderTasks(); updateProgressBar();
        };
        return;
    }
    let idx = solved, task = tasks[idx];
    let html = `<div class="task-text">📌 Задача ${idx+1}: ${task.text}</div>
                <div class="input-group"><input type="number" id="taskAnswer" class="input-number" placeholder="Числовой ответ" step="any"><button id="checkTaskBtn" class="check-btn">Проверить</button></div>
                <div class="feedback" id="taskFeedback"></div>
                <button id="nextTaskBtn" class="next-btn" style="display:none;">➡️ Следующая задача</button>`;
    document.getElementById("tasksContent").innerHTML = html;
    let check = document.getElementById("checkTaskBtn"), input = document.getElementById("taskAnswer"), next = document.getElementById("nextTaskBtn");
    let localLock = false, nextAdded = false;
    check.onclick = ()=>{
        if(localLock){ showTaskFeedback("Вы уже проверили. Нажмите 'Следующая задача'.","warning"); return; }
        let val = parseFloat(input.value);
        if(isNaN(val)){ showTaskFeedback("Введите число.","warning"); return; }
        let correct = Math.abs(val - task.ans) < 0.001;
        if(correct){
            if(tasksProgress[currentFigure] === idx){
                adjustScore(5);
                tasksProgress[currentFigure] = idx+1;
                showTaskFeedback(`✅ +5 баллов. ${task.exp}`,"success");
            } else { showTaskFeedback(`✅ Верно! (уже было)`,"success"); }
            localLock = true;
            if(!nextAdded){ next.style.display="block"; next.onclick=()=>{ renderTasks(); updateProgressBar(); }; nextAdded=true; }
        } else {
            if(!taskPenalty[currentFigure][idx]){
                adjustScore(-2);
                taskPenalty[currentFigure][idx] = true;
                showTaskFeedback(`❌ -2 балла. Правильный ответ: ${task.ans}. ${task.exp}`,"error");
            } else { showTaskFeedback(`❌ Неверно. Ответ: ${task.ans}. (штраф уже был)`,"error"); }
            if(!nextAdded){ next.style.display="block"; next.onclick=()=>{ renderTasks(); updateProgressBar(); }; nextAdded=true; }
        }
    };
    function showTaskFeedback(msg,type){
        let fb = document.getElementById("taskFeedback");
        fb.innerHTML = msg;
        fb.style.background = type==="success"?"#d4edda":(type==="error"?"#f8d7da":"#fff3cd");
    }
}

function initTabs(){
    document.querySelectorAll(".tab-btn").forEach(btn=>{
        btn.onclick = ()=>{
            let tab = btn.dataset.tab;
            if(tab===activeTab) return;
            activeTab = tab;
            document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("testContent").classList.toggle("active", tab==="test");
            document.getElementById("tasksContent").classList.toggle("active", tab==="tasks");
            answerLock = false;
            renderActiveTab();
        };
    });
}

initProgress();
renderNav();
loadFigure();
initTabs();
renderActiveTab();
document.getElementById("resetProgressBtn").onclick = resetAll;
document.getElementById("exportPDFBtn").onclick = exportToPDF;
</script>
</body>
</html>
